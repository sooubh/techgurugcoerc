name: care_ai
description: "CARE-AI — AI Parenting Companion for Children with Disabilities"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4
  google_sign_in: ^6.2.2

  # Google AI (Gemini)

  # State Management
  provider: ^6.1.2

  # Text-to-Speech & Speech-to-Text
  flutter_tts: ^4.2.0
  speech_to_text: ^7.3.0

  # Fonts & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Charts
  fl_chart: ^0.70.2

  # Date Formatting
  intl: ^0.20.2

  # Icons
  cupertino_icons: ^1.0.8

  # Utilities
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.4
  connectivity_plus: ^6.1.1
  image_picker: ^1.1.2
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.2.0+3
  flutter_markdown: ^0.7.7+1
  flutter_dotenv: ^6.0.0
  cloud_functions: ^5.6.2
  flutter_local_notifications: ^21.0.0-dev.2
  timezone: ^0.11.0
  google_generative_ai: ^0.4.7
  permission_handler: ^12.0.1
  video_player: ^2.8.7
  chewie: ^1.8.1
  video_thumbnail: ^0.5.3
  mime: ^1.0.5
  path_provider: ^2.1.5

  # Real-time Audio (Gemini Live API)
  record: ^6.2.0
  web_socket_channel: ^3.0.0
  flutter_sound: ^9.2.13
  audioplayers: ^6.6.0
  firebase_database: ^11.3.10
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  workmanager: ^0.9.0+3
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/
